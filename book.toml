[book]
authors = ["Rodrigo Zamperlini"]
language = "en"
src = "src"
title = "Rodrigo Zamperlini | Integration & Solution Architecture"
description = "Portfolio for solution architecture, integration architecture, Power Platform, and enterprise systems."

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/rzamperlini/rzamperlini"
edit-url-template = "https://github.com/rzamperlini/rzamperlini/edit/main/{path}"
additional-css = ["theme/custom.css"]
no-section-label = true

[preprocessor]

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html.fold]
enable = true
level = 1
